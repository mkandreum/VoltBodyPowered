<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VoltBody" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Preconnect to Google Fonts to reduce latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the primary font subset to avoid FOIT/FOUT layout shifts -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@500;700&family=Sora:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@500;700&family=Sora:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    />
    <title>VoltBody Powered</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#050505;color:#39ff14;font-family:'Inter',sans-serif;flex-direction:column">
        <div style="font-size:2rem;font-weight:bold;margin-bottom:1rem">⚡ VoltBody</div>
        <div style="color:#666;font-family:'Inter',sans-serif">Cargando...</div>
      </div>
    </div>
    <noscript>
      <div style="padding:2rem;color:white;background:#050505;min-height:100vh;font-family:'Inter',sans-serif;text-align:center">
        <h1>VoltBody Powered</h1>
        <p>JavaScript es necesario para usar esta aplicación.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
